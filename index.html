<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Character Garden</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <p class="title">Chinese Character Garden</p>

    <h1 id="word"></h1>

    <p id="pinyin"></p>

    <p class="question">What does this mean?</p>

    <button id="btn1"></button>
    <button id="btn2"></button>
    <button id="btn3"></button>
    <button id="btn4"></button>
    <button id = 'speak-btn'>Hear pronunciation</button>

    <button id="restart-btn" style="display:none;">
        Restart Garden
    </button>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <p id="flowers">Progress: 0 / 50</p>

    <p id="garden-stage">Stage 1 • Seed</p>

    <p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
